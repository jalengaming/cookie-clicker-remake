<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cookie Empire</title>

<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #111;
    color: #fff;
    text-align: center;
    font-family: 'Fredoka', sans-serif;
}

h1 {
    font-family: 'Bungee', sans-serif;
    font-size: 32px;
}

#container {
    max-width: 420px;
    margin: auto;
}

#cookie {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    margin: 20px auto;
    position: relative;
    cursor: pointer;
    background: radial-gradient(circle at 30% 30%, #e0a96d, #c97a2b, #8b4e1d);
    border: 5px solid #5a3416;
    box-shadow: 0 6px 0 #5a3416;
}

.chip {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    position: absolute;
    background: radial-gradient(circle, #5a3a2a, #2b1a12);
}

#cookie:active {
    transform: scale(0.9);
}

.panel {
    background: #222;
    margin: 10px;
    padding: 10px;
    border-radius: 6px;
    text-align: left;
}

button {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
    border: none;
    background: #3498db;
    color: white;
    border-radius: 4px;
}

.locked {
    opacity: 0.4;
}
</style>
</head>

<body>

<div id="container">
    <h1>Cookie Empire</h1>

    <div id="cookie"></div>

    <div class="panel">
        Cookies: <span id="cookies">0</span><br>
        Per Click: <span id="perClick">1</span><br>
        Per Second: <span id="perSecond">0</span>
    </div>

    <div class="panel" id="upgrades"></div>
    <div class="panel" id="achievements"></div>
</div>

<script>
let cookies = 0;
let perClick = 1;
let perSecond = 0;

const cookieEl = document.getElementById("cookie");
const cookiesEl = document.getElementById("cookies");
const perClickEl = document.getElementById("perClick");
const perSecondEl = document.getElementById("perSecond");
const upgradesEl = document.getElementById("upgrades");
const achievementsEl = document.getElementById("achievements");

/* SOUND */
function beep(freq) {
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.frequency.value = freq;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(() => osc.stop(), 80);
}

/* COOKIE CHIPS */
function createChips() {
    const pos = [[30,40],[90,20],[130,60],[50,100],[120,110],[80,70]];
    pos.forEach(p=>{
        let c = document.createElement("div");
        c.className="chip";
        c.style.left=p[0]+"px";
        c.style.top=p[1]+"px";
        cookieEl.appendChild(c);
    });
}
createChips();

/* UPGRADES */
const upgrades = [
    {name:"Cursor", cost:10, cps:1, owned:0, unlock:0},
    {name:"Grandma", cost:50, cps:5, owned:0, unlock:20},
    {name:"Farm", cost:150, cps:15, owned:0, unlock:100},
    {name:"Factory", cost:400, cps:40, owned:0, unlock:300},
    {name:"Bank", cost:1000, cps:100, owned:0, unlock:700}
];

/* ACHIEVEMENTS */
const achievements = [
    {name:"First Click", req:1, done:false},
    {name:"Getting Started", req:50, done:false},
    {name:"Cookie Master", req:500, done:false},
    {name:"Cookie Empire", req:2000, done:false}
];

/* COOKIE LOOK */
function updateCookieVisual() {
    if (cookies > 2000) cookieEl.style.background = "gold";
    else if (cookies > 500) cookieEl.style.background = "#d4a017";
}

/* UI */
function updateUI() {
    cookiesEl.textContent = Math.floor(cookies);
    perClickEl.textContent = perClick;
    perSecondEl.textContent = perSecond;

    upgradesEl.innerHTML = "<strong>Upgrades</strong><br>";
    upgrades.forEach((u,i)=>{
        let locked = cookies < u.unlock;
        let div = document.createElement("div");
        div.className = locked ? "locked":"";

        div.innerHTML = `
        ${u.name}<br>
        Cost: ${u.cost}<br>
        Owned: ${u.owned}<br>
        +${u.cps}/sec<br>
        <button onclick="buyUpgrade(${i})" ${locked?"disabled":""}>Buy</button>
        `;
        upgradesEl.appendChild(div);
    });

    achievementsEl.innerHTML = "<strong>Achievements</strong><br>";
    achievements.forEach(a=>{
        if (cookies >= a.req && !a.done) {
            a.done = true;
            beep(600);
        }
        if (a.done) {
            achievementsEl.innerHTML += "✔ " + a.name + "<br>";
        }
    });

    updateCookieVisual();
}

/* BUY */
function buyUpgrade(i){
    let u = upgrades[i];
    if(cookies>=u.cost){
        cookies-=u.cost;
        u.owned++;
        perSecond+=u.cps;
        u.cost=Math.floor(u.cost*1.5);
        beep(200);
        updateUI();
        save();
    }
}

/* CLICK */
cookieEl.onclick = cookieEl.ontouchstart = ()=>{
    cookies+=perClick;
    beep(400);
    updateUI();
    save();
};

/* PASSIVE */
setInterval(()=>{
    cookies+=perSecond;
    updateUI();
},1000);

/* AUTO SAVE */
setInterval(save, 2000);

/* SAVE */
function save(){
    localStorage.setItem("cookieSave", JSON.stringify({
        cookies, perClick, perSecond, upgrades, achievements
    }));
}

/* LOAD */
function load(){
    let s = JSON.parse(localStorage.getItem("cookieSave"));
    if(s){
        cookies=s.cookies;
        perClick=s.perClick;
        perSecond=s.perSecond;
        for(let i=0;i<upgrades.length;i++) upgrades[i]=s.upgrades[i];
        for(let i=0;i<achievements.length;i++) achievements[i]=s.achievements[i];
    }
}

load();
updateUI();
</script>

</body>
</html>
